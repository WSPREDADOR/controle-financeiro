<!DOCTYPE html>
<html>
<head>
  <title>Simulador de Update</title>
  <!-- Simula o ambiente do app v1.4.15 -->
  <script>
    // Simula a flag que o runtime usa
    window.__CF_RUNTIME_ACTIVE__ = false;
    
    // Simula o localStorage com o bundle da v1.4.23
    const mockBundle = {
      version: '1.4.23',
      html: `
        <!DOCTYPE html>
        <html>
        <head><title>App v1.4.23</title></head>
        <body style="background: #000; color: #fff;">
          <div class="app-shell bundle-shell">
            <h1>SOU A VERSÃO NOVA 1.4.23</h1>
            <p>Se você estiver me vendo e NADA mais abaixo, o teste passou!</p>
          </div>
          <script>window.__CF_RUNTIME_ACTIVE__ = true;<\/script>
        </body>
        </html>
      `
    };
    
    // Função que acabei de escrever no web-runtime.js
    function runTestUpdate() {
      console.log("Iniciando simulação de limpeza radical...");
      
      window.__CF_RUNTIME_ACTIVE__ = true;
      window.stop();
      
      // Técnica do innerHTML que usei na v1.4.23
      setTimeout(() => {
        document.documentElement.innerHTML = mockBundle.html;
        console.log("Update injetado. Verificando se sobrou lixo...");
      }, 0);
    }
  </script>
</head>
<body style="background: #444; color: #ccc;">
  <div class="app-shell">
    <h1>SOU A VERSÃO VELHA 1.4.15</h1>
    <p>Eu deveria DESAPARECER completamente após o update.</p>
  </div>
  
  <button onclick="runTestUpdate()" style="padding: 20px; font-size: 20px;">
    CLIQUE PARA SIMULAR UPDATE (1.4.23)
  </button>

  <div style="margin-top: 1000px; border: 5px solid red; padding: 20px;">
    <h2>FIM DA PÁGINA 1.4.15</h2>
    <p>Se este bloco vermelho aparecer APÓS o update, o bug ainda existe.</p>
  </div>
</body>
</html>
