<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Dívidas</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Manrope", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(85, 212, 203, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(241, 182, 111, 0.14), transparent 30%),
        transparent;
      overflow: hidden;
    }

    .splash-shell {
      width: 100%;
      height: 100vh;
      padding: 18px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(85, 212, 203, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(241, 182, 111, 0.16), transparent 28%);
    }

    .splash-card {
      width: 100%;
      max-width: 420px;
      padding: 28px 26px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(25, 34, 40, 0.98), rgba(14, 21, 26, 0.96));
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .splash-card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.18), transparent 75%);
    }

    .splash-card::after {
      content: "";
      position: absolute;
      inset: auto -40px -52px auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(85, 212, 203, 0.12), transparent 68%);
      pointer-events: none;
    }

    .splash-icon-wrap {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 128px;
      height: 128px;
      margin: 0 auto;
    }

    .splash-icon-wrap::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(85, 212, 203, 0.22), rgba(85, 212, 203, 0.04) 58%, transparent 72%);
      filter: blur(6px);
      animation: pulse-glow 2.8s ease-in-out infinite;
    }

    .splash-icon {
      width: 96px;
      height: 96px;
      object-fit: contain;
      filter: drop-shadow(0 14px 22px rgba(0, 0, 0, 0.28));
      animation: float-in 0.7s ease;
    }

    .eyebrow {
      display: block;
      margin-top: 18px;
      color: #f1b66f;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 0;
      color: #eef4f7;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: 2rem;
      line-height: 1.02;
      letter-spacing: -0.05em;
      animation: rise-in 0.75s ease;
    }

    p {
      margin: 12px auto 0;
      max-width: 28ch;
      color: #a6b4bf;
      line-height: 1.55;
      animation: rise-in 0.9s ease;
    }

    .splash-meta {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .splash-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #d8e5ec;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      animation: rise-in 1s ease;
    }

    .loader {
      width: 100%;
      height: 10px;
      margin-top: 22px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .loader::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #f1b66f, #55d4cb);
      box-shadow: 0 0 18px rgba(85, 212, 203, 0.24);
      animation: loading 1.2s ease-in-out infinite;
    }

    .splash-signature {
      margin-top: 18px;
      color: #8ea0ac;
      font-size: 0.83rem;
      letter-spacing: 0.03em;
      animation: rise-in 1.1s ease;
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(320%);
      }
    }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float-in {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulse-glow {
      0%,
      100% {
        opacity: 0.7;
        transform: scale(0.96);
      }

      50% {
        opacity: 1;
        transform: scale(1.04);
      }
    }
  </style>
</head>
<body>
  <div class="splash-shell">
    <section class="splash-card" aria-label="Tela de abertura do Controle de Dívidas">
      <div class="splash-icon-wrap">
        <img src="build/icon.png" alt="Icone do Controle de Dívidas" class="splash-icon">
      </div>
      <span class="eyebrow">Controle de pagamentos</span>
      <h1>Controle de Dívidas</h1>
      <p>Organizando seus compromissos e pagamentos com uma abertura mais elegante.</p>
      <div class="splash-meta" aria-label="Informacoes da versao">
        <span class="splash-pill">Versao 2.1.1</span>
        <span class="splash-pill">Desktop para Windows</span>
      </div>
      <div class="loader" aria-hidden="true"></div>
      <div class="splash-signature">Desenvolvido por Werbert Silva</div>
    </section>
  </div>
</body>
</html>
